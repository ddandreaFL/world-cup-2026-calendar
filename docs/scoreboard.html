<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FIFA World Cup 2026 вЂ” Live Scoreboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #efe3cc;        /* cream */
    --card: #fbf5e9;      /* warm off-white */
    --card2: #f3e7d0;     /* soft tan */
    --line: #d9c3a1;      /* tan border */
    --text: #3b2a1c;      /* dark brown */
    --muted: #8a7256;     /* muted brown */
    --accent: #8a5a2b;    /* warm brown */
    --live: #b3402e;      /* terracotta */
    --win: #6b7d2e;       /* earthy olive */
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font: 16px/1.45 "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: radial-gradient(1200px 600px at 50% -10%, #fbf2dd 0%, var(--bg) 60%);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    max-width: 760px;
    margin: 0 auto;
    padding: 28px 16px 8px;
    text-align: center;
  }
  h1 { font-size: 1.5rem; margin: 0 0 4px; letter-spacing: .2px; }
  .sub { color: var(--muted); font-size: .85rem; }
  .nav {
    max-width: 760px;
    margin: 16px auto 4px;
    padding: 0 16px;
    display: flex;
    gap: 8px;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
  }
  .nav button, .nav input {
    background: var(--card);
    color: var(--text);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 8px 12px;
    font-size: .9rem;
    cursor: pointer;
  }
  .nav input { cursor: text; color-scheme: light; }
  .nav button:hover { border-color: var(--accent); }
  .nav button:disabled { opacity: .4; cursor: not-allowed; }
  .nav .today { font-weight: 600; }
  main { max-width: 760px; margin: 8px auto 48px; padding: 0 16px; }
  .daylabel { color: var(--muted); font-size: .85rem; text-align: center; margin: 8px 0 14px; }
  .match {
    background: linear-gradient(180deg, var(--card), var(--card2));
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px 16px;
    margin: 10px 0;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 10px;
    box-shadow: 0 1px 3px rgba(59,42,28,.08);
  }
  .match.live { border-color: rgba(179,64,46,.55); box-shadow: 0 0 0 1px rgba(179,64,46,.18); }
  .team { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .team.home { justify-content: flex-end; text-align: right; }
  .team.away { justify-content: flex-start; text-align: left; }
  .flag { font-size: 1.7rem; line-height: 1; flex: none; }
  .tname { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tname.winner { color: var(--win); font-weight: 600; }
  .center { text-align: center; min-width: 84px; }
  .score { font-size: 1.45rem; font-weight: 700; letter-spacing: 1px; }
  .vs { color: var(--muted); font-weight: 600; }
  .badge {
    margin-top: 4px;
    font-size: .72rem;
    color: var(--muted);
    white-space: nowrap;
  }
  .badge.live { color: var(--live); font-weight: 700; }
  .dot {
    display: inline-block; width: 7px; height: 7px; border-radius: 50%;
    background: var(--live); margin-right: 5px; vertical-align: middle;
    animation: pulse 1.2s infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .25; } }
  .venue { grid-column: 1 / -1; text-align: center; color: var(--muted); font-size: .72rem; margin-top: 2px; }
  .venue a { color: var(--muted); text-decoration: none; border-bottom: 1px dotted var(--line); }
  .empty, .err { text-align: center; color: var(--muted); padding: 40px 0; }
  .err { color: var(--live); }
  footer { text-align: center; color: var(--muted); font-size: .78rem; padding: 8px 16px 32px; }
  .updated { color: var(--muted); font-size: .78rem; text-align: center; margin-top: 6px; }
</style>
</head>
<body>
  <header>
    <h1>вљҢ FIFA World Cup 2026</h1>
    <div class="sub">Live scoreboard В· auto-refreshes every 30s</div>
  </header>

  <div class="nav">
    <button id="prev" title="Previous day">вЂ№ Prev</button>
    <input type="date" id="date" min="2026-06-11" max="2026-07-19" />
    <button id="next" title="Next day">Next вЂғ</button>
    <button id="today" class="today">Today</button>
  </div>

  <main>
    <div class="daylabel" id="daylabel"></div>
    <div id="list"><div class="empty">LoadingвЂ¦</div></div>
    <div class="updated" id="updated"></div>
  </main>

  <footer>
    Scores from ESPN's public FIFA World Cup feed. Pairs with the
    <a href="world_cup_2026.ics" style="color:var(--accent)">subscribable calendar</a>.
  </footer>

<script>
const FLAGS = {"USA":"рџ‡ғрџ‡ё","CAN":"рџ‡Ёрџ‡¦","MEX":"рџ‡Ірџ‡Ң","ARG":"рџ‡¦рџ‡·","BRA":"рџ‡§рџ‡·","URU":"рџ‡ғрџ‡ң","COL":"рџ‡Ёрџ‡ө","ECU":"рџ‡Ғрџ‡Ё","PAR":"рџ‡µрџ‡ң","CHI":"рџ‡Ёрџ‡±","PER":"рџ‡µрџ‡Ғ","VEN":"рџ‡»рџ‡Ғ","BOL":"рџ‡§рџ‡ө","ENG":"рџЏөу Ѓ§у Ѓұу ЃӨу Ѓ®у Ѓ§у Ѓү","SCO":"рџЏөу Ѓ§у Ѓұу Ѓіу ЃӘу Ѓөу Ѓү","WAL":"рџЏөу Ѓ§у Ѓұу Ѓ·у Ѓ¬у Ѓіу Ѓү","NIR":"рџ‡¬рџ‡§","FRA":"рџ‡«рџ‡·","GER":"рџ‡©рџ‡Ғ","ESP":"рџ‡Ғрџ‡ё","POR":"рџ‡µрџ‡№","NED":"рџ‡ірџ‡±","ITA":"рџ‡®рџ‡№","BEL":"рџ‡§рџ‡Ғ","CRO":"рџ‡­рџ‡·","SUI":"рџ‡Ёрџ‡­","DEN":"рџ‡©рџ‡°","POL":"рџ‡µрџ‡±","SRB":"рџ‡·рџ‡ё","CZE":"рџ‡Ёрџ‡ү","AUT":"рџ‡¦рџ‡№","TUR":"рџ‡№рџ‡·","NOR":"рџ‡ірџ‡ө","SWE":"рџ‡ёрџ‡Ғ","UKR":"рџ‡ғрџ‡¦","HUN":"рџ‡­рџ‡ғ","ROU":"рџ‡·рџ‡ө","GRE":"рџ‡¬рџ‡·","IRL":"рџ‡®рџ‡Ғ","SVK":"рџ‡ёрџ‡°","SVN":"рџ‡ёрџ‡®","FIN":"рџ‡«рџ‡®","ALB":"рџ‡¦рџ‡±","BUL":"рџ‡§рџ‡¬","ISL":"рџ‡®рџ‡ё","MAR":"рџ‡Ірџ‡¦","SEN":"рџ‡ёрџ‡і","EGY":"рџ‡Ғрџ‡¬","NGA":"рџ‡ірџ‡¬","GHA":"рџ‡¬рџ‡­","CIV":"рџ‡Ёрџ‡®","ALG":"рџ‡©рџ‡ү","TUN":"рџ‡№рџ‡і","CMR":"рџ‡Ёрџ‡І","MLI":"рџ‡Ірџ‡±","RSA":"рџ‡үрџ‡¦","ANG":"рџ‡¦рџ‡ө","BFA":"рџ‡§рџ‡«","CPV":"рџ‡Ёрџ‡»","JPN":"рџ‡Үрџ‡µ","KOR":"рџ‡°рџ‡·","IRN":"рџ‡®рџ‡·","AUS":"рџ‡¦рџ‡ғ","KSA":"рџ‡ёрџ‡¦","IRQ":"рџ‡®рџ‡¶","UAE":"рџ‡¦рџ‡Ғ","QAT":"рџ‡¶рџ‡¦","UZB":"рџ‡ғрџ‡ү","JOR":"рџ‡Үрџ‡ө","CHN":"рџ‡Ёрџ‡і","THA":"рџ‡№рџ‡­","CRC":"рџ‡Ёрџ‡·","JAM":"рџ‡Үрџ‡І","PAN":"рџ‡µрџ‡¦","HON":"рџ‡­рџ‡і","SLV":"рџ‡ёрџ‡»","HAI":"рџ‡­рџ‡№","TRI":"рџ‡№рџ‡№","CUB":"рџ‡Ёрџ‡ғ","CUR":"рџ‡Ёрџ‡ә","NZL":"рџ‡ірџ‡ү","BIH":"рџ‡§рџ‡¦","RUS":"рџ‡·рџ‡ғ","ISR":"рџ‡®рџ‡±","GEO":"рџ‡¬рџ‡Ғ","ARM":"рџ‡¦рџ‡І","AZE":"рџ‡¦рџ‡ү","MNE":"рџ‡Ірџ‡Ғ","MKD":"рџ‡Ірџ‡°","KAZ":"рџ‡°рџ‡ү","BLR":"рџ‡§рџ‡ң","LUX":"рџ‡±рџ‡ғ","CYP":"рџ‡Ёрџ‡ң","MLT":"рџ‡Ірџ‡№","MDA":"рџ‡Ірџ‡©","GUI":"рџ‡¬рџ‡і","GAM":"рџ‡¬рџ‡І","ZAM":"рџ‡үрџ‡І","ZIM":"рџ‡үрџ‡ә","MOZ":"рџ‡Ірџ‡ү","MAD":"рџ‡Ірџ‡¬","BEN":"рџ‡§рџ‡Ү","TOG":"рџ‡№рџ‡¬","CGO":"рџ‡Ёрџ‡¬","COD":"рџ‡Ёрџ‡©","GAB":"рџ‡¬рџ‡¦","UGA":"рџ‡ғрџ‡¬","KEN":"рџ‡°рџ‡Ғ","TAN":"рџ‡№рџ‡ү","ETH":"рџ‡Ғрџ‡№","SUD":"рџ‡ёрџ‡©","LBY":"рџ‡±рџ‡ң","MTN":"рџ‡Ірџ‡·","NIG":"рџ‡ірџ‡Ғ","SLE":"рџ‡ёрџ‡±","LBR":"рџ‡±рџ‡·","GNB":"рџ‡¬рџ‡ә","BDI":"рџ‡§рџ‡®","RWA":"рџ‡·рџ‡ә","COM":"рџ‡°рџ‡І","BHR":"рџ‡§рџ‡­","OMA":"рџ‡өрџ‡І","KUW":"рџ‡°рџ‡ә","YEM":"рџ‡ңрџ‡Ғ","LIB":"рџ‡±рџ‡§","SYR":"рџ‡ёрџ‡ң","PLE":"рџ‡µрџ‡ё","AFG":"рџ‡¦рџ‡«","IND":"рџ‡®рџ‡і","PAK":"рџ‡µрџ‡°","BAN":"рџ‡§рџ‡©","VIE":"рџ‡»рџ‡і","MAS":"рџ‡Ірџ‡ң","SIN":"рџ‡ёрџ‡¬","INA":"рџ‡®рџ‡©","PHI":"рџ‡µрџ‡­","MYA":"рџ‡Ірџ‡І","PRK":"рџ‡°рџ‡µ","TPE":"рџ‡№рџ‡ә","HKG":"рџ‡­рџ‡°","MAC":"рџ‡Ірџ‡ө","TKM":"рџ‡№рџ‡І","TJK":"рџ‡№рџ‡Ү","KGZ":"рџ‡°рџ‡¬","GUA":"рџ‡¬рџ‡№","NCA":"рџ‡ірџ‡®","BLZ":"рџ‡§рџ‡ү","DOM":"рџ‡©рџ‡ө","BAH":"рџ‡§рџ‡ё","BRB":"рџ‡§рџ‡§","GRN":"рџ‡¬рџ‡©","GUY":"рџ‡¬рџ‡ң","SUR":"рџ‡ёрџ‡·","FIJ":"рџ‡«рџ‡Ү","PNG":"рџ‡µрџ‡¬","SOL":"рџ‡ёрџ‡§","VAN":"рџ‡»рџ‡ғ","TAH":"рџ‡µрџ‡«","NCL":"рџ‡ірџ‡Ё","SAM":"рџ‡әрџ‡ё","TGA":"рџ‡№рџ‡ө"};

const START = "2026-06-11", END = "2026-07-19";
const SCOREBOARD = "https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=";
const REFRESH_MS = 30000;

const $ = (id) => document.getElementById(id);
const dateInput = $("date");
let current = clampDate(todayStr());
let timer = null;

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function clampDate(s) { return s < START ? START : s > END ? END : s; }
function compact(s) { return s.replaceAll("-", ""); }
function esc(s) {
  return (s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
}
function flag(abbr) { return FLAGS[(abbr || "").toUpperCase()] || "вљҢ"; }

function fmtKickoff(iso) {
  const d = new Date(iso);
  return d.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
}
function fmtDayLabel(s) {
  const [y, m, d] = s.split("-").map(Number);
  return new Date(y, m - 1, d).toLocaleDateString([], {
    weekday: "long", month: "long", day: "numeric", year: "numeric"
  });
}

function teamInfo(c) {
  const t = c.team || {};
  return {
    name: t.shortDisplayName || t.displayName || t.name || "TBD",
    abbr: t.abbreviation || "",
    score: c.score ?? "",
    winner: !!c.winner,
  };
}

function renderMatch(ev) {
  const comp = (ev.competitions || [])[0] || {};
  const comps = comp.competitors || [];
  const home = teamInfo(comps.find(c => c.homeAway === "home") || comps[0] || {});
  const away = teamInfo(comps.find(c => c.homeAway === "away") || comps[1] || {});
  const status = comp.status || ev.status || {};
  const type = status.type || {};
  const state = type.state || "pre";
  const link = (ev.links && ev.links[0] && ev.links[0].href) || "";
  const venueObj = comp.venue || {};
  const venue = venueObj.fullName || "";

  let center, badge;
  if (state === "in") {
    const clock = status.displayClock || type.shortDetail || "LIVE";
    center = `<div class="score">${esc(home.score)}вЂ“${esc(away.score)}</div>`;
    badge = `<div class="badge live"><span class="dot"></span>${esc(clock)}</div>`;
  } else if (state === "post" || type.completed) {
    center = `<div class="score">${esc(home.score)}вЂ“${esc(away.score)}</div>`;
    badge = `<div class="badge">Full time</div>`;
  } else {
    center = `<div class="vs">vs</div>`;
    badge = `<div class="badge">${esc(fmtKickoff(ev.date))}</div>`;
  }

  const hn = `tname${home.winner ? " winner" : ""}`;
  const an = `tname${away.winner ? " winner" : ""}`;
  const venueHtml = venue
    ? `<div class="venue">${link ? `<a href="${esc(link)}" target="_blank" rel="noopener">${esc(venue)}</a>` : esc(venue)}</div>`
    : "";

  return `
    <div class="match${state === "in" ? " live" : ""}">
      <div class="team home">
        <span class="${hn}">${esc(home.name)}</span>
        <span class="flag">${flag(home.abbr)}</span>
      </div>
      <div class="center">${center}${badge}</div>
      <div class="team away">
        <span class="flag">${flag(away.abbr)}</span>
        <span class="${an}">${esc(away.name)}</span>
      </div>
      ${venueHtml}
    </div>`;
}

async function load() {
  $("daylabel").textContent = fmtDayLabel(current);
  dateInput.value = current;
  $("prev").disabled = current <= START;
  $("next").disabled = current >= END;

  try {
    const res = await fetch(SCOREBOARD + compact(current), { cache: "no-store" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    const events = (data.events || []).slice().sort((a, b) => (a.date || "").localeCompare(b.date || ""));
    $("list").innerHTML = events.length
      ? events.map(renderMatch).join("")
      : `<div class="empty">No matches scheduled for this day.</div>`;
    $("updated").textContent = "Updated " + new Date().toLocaleTimeString();
  } catch (e) {
    $("list").innerHTML = `<div class="err">Couldn't load scores (${esc(e.message)}). RetryingвЂ¦</div>`;
  }
}

function go(dateStr) {
  current = clampDate(dateStr);
  load();
  restartTimer();
}
function shift(days) {
  const [y, m, d] = current.split("-").map(Number);
  const dt = new Date(y, m - 1, d + days);
  go(`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,"0")}-${String(dt.getDate()).padStart(2,"0")}`);
}
function restartTimer() {
  if (timer) clearInterval(timer);
  timer = setInterval(load, REFRESH_MS);
}

$("prev").onclick = () => shift(-1);
$("next").onclick = () => shift(1);
$("today").onclick = () => go(todayStr());
dateInput.onchange = (e) => go(e.target.value);
document.addEventListener("visibilitychange", () => { if (!document.hidden) load(); });

go(current);
</script>
</body>
</html>
