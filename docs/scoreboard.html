<style>
  :root {
    --paper: #e9e6dd; --ink: #16130d; --barText: #f1ede3;
    --line: rgba(22,19,13,.16); --line-strong: rgba(22,19,13,.85);
    --muted: rgba(22,19,13,.52); --live: #c1352a;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--ink); background: #d9d5ca; -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  .card { max-width: 820px; margin: 0 auto; background: var(--paper); min-height: 100vh; }
  @media (min-width: 860px) {
    body { padding: 28px 0; }
    .card { min-height: 0; border-radius: 16px; overflow: hidden; box-shadow: 0 24px 60px rgba(0,0,0,.35); }
  }

  .topbar {
    background: var(--ink); color: var(--barText);
    display: flex; align-items: center; justify-content: space-between;
    padding: clamp(10px,2.4vw,14px) clamp(14px,3.4vw,22px);
  }
  .brand { display: flex; align-items: center; gap: 9px; font-weight: 800; letter-spacing: .02em; font-size: clamp(13px,2.8vw,16px); }
  .brand .mark { display: inline-grid; place-items: center; width: 24px; height: 24px; border-radius: 6px; background: var(--barText); color: var(--ink); font-weight: 900; font-size: 14px; }
  .season { font-size: clamp(10px,2.3vw,12px); font-weight: 700; letter-spacing: .14em; opacity: .85; text-transform: uppercase; }

  .content { padding: clamp(14px,3vw,22px) clamp(14px,3.4vw,24px) clamp(12px,2.6vw,20px); }

  .titlerow { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
  .title { font-weight: 800; font-size: clamp(22px,5vw,34px); letter-spacing: -.025em; line-height: 1; }
  .titledate { text-align: right; font-weight: 700; font-size: clamp(11px,2.5vw,13px); line-height: 1.25; white-space: nowrap; }

  .nav { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin: 14px 0 2px; }
  .nav button, .nav input {
    font-family: inherit; background: transparent; color: var(--ink);
    border: 1.5px solid var(--line-strong); border-radius: 8px;

    letter-spacing: .04em; cursor: pointer; text-transform: uppercase;

  .ghead .live { color: var(--live); }

  .row { display: grid; grid-template-columns: auto minmax(0,1fr) auto auto; align-items: center; gap: clamp(8px,2.4vw,18px); padding: clamp(8px,1.8vw,12px) 0; border-top: 1px solid var(--line); }
  .game .row:first-of-type { border-top: 1.5px solid var(--line-strong); }
  .game .meta { border-top: 1px solid var(--line); }

  .side { display: flex; flex-direction: column; align-items: center; gap: 3px; width: clamp(36px,9vw,50px); }
  .tag { background: var(--ink); color: var(--barText); font-size: 8px; font-weight: 800; letter-spacing: .1em; padding: 2px 5px; border-radius: 3px; line-height: 1; }
  .flag { font-size: clamp(1.5rem,5.2vw,2.1rem); line-height: 1; }

  .name { font-weight: 800; letter-spacing: -.025em; font-size: clamp(1.45rem,6vw,2.6rem); line-height: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .stats { display: flex; gap: clamp(10px,2.4vw,22px); }
  .st { display: flex; flex-direction: column; align-items: center; gap: 2px; min-width: 24px; }
  .st .lbl { font-size: 9px; font-weight: 800; letter-spacing: .08em; color: var(--muted); }
  .st .val { font-size: clamp(13px,2.7vw,16px); font-weight: 700; font-variant-numeric: tabular-nums; }

  .scorecol { text-align: right; min-width: clamp(42px,11vw,76px); }
  .scorebig { font-weight: 900; letter-spacing: -.03em; font-size: clamp(1.9rem,7.5vw,3rem); line-height: .95; font-variant-numeric: tabular-nums; }
  .scoretime { font-weight: 800; font-size: clamp(13px,2.8vw,16px); white-space: nowrap; }

  .meta { padding: 8px 0 2px; display: flex; flex-direction: column; gap: 3px; }
  .meta .venue { font-size: clamp(10px,2.3vw,12px); font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: var(--muted); }
  .meta .ev { font-size: clamp(11px,2.4vw,13.5px); }
  .meta .ev i { color: var(--muted); font-style: normal; }

  .foot { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-top: 16px; padding-top: 12px; border-top: 1.5px solid var(--line-strong); }
  .navlinks { display: flex; align-items: center; gap: clamp(10px,2.8vw,20px); }
  .burger { display: inline-flex; flex-direction: column; gap: 3px; }
  .burger span { width: 17px; height: 1.5px; background: var(--ink); }
  .navlinks a { color: var(--ink); text-decoration: none; font-size: clamp(10px,2.3vw,12px); font-weight: 800; letter-spacing: .1em; text-transform: uppercase; }
  .navlinks a:hover { opacity: .6; }
  .tagline { font-weight: 800; font-style: italic; font-size: clamp(13px,3vw,18px); letter-spacing: -.01em; }
  .tagline.live { color: var(--live); font-style: normal; }

  .note { color: var(--muted); font-weight: 600; padding: 40px 0; text-align: center; }
  @media (max-width: 560px) { .stats { display: none; } }
  @media (prefers-reduced-motion: reduce) { .pulse { animation: none; } }
  .pulse { animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }
</style>

<script>
const FLAGS = {"USA":"рџ‡єрџ‡ё","CAN":"рџ‡Ёрџ‡¦","MEX":"рџ‡Ірџ‡Ѕ","ARG":"рџ‡¦рџ‡·","BRA":"рџ‡§рџ‡·","URU":"рџ‡єрџ‡ѕ","COL":"рџ‡Ёрџ‡ґ","ECU":"рџ‡Єрџ‡Ё","PAR":"рџ‡µрџ‡ѕ","CHI":"рџ‡Ёрџ‡±","PER":"рџ‡µрџ‡Є","VEN":"рџ‡»рџ‡Є","BOL":"рџ‡§рџ‡ґ","ENG":"рџЏґу Ѓ§у Ѓўу ЃҐу Ѓ®у Ѓ§у Ѓї","SCO":"рџЏґу Ѓ§у Ѓўу Ѓіу ЃЈу Ѓґу Ѓї","WAL":"рџЏґу Ѓ§у Ѓўу Ѓ·у Ѓ¬у Ѓіу Ѓї","NIR":"рџ‡¬рџ‡§","FRA":"рџ‡«рџ‡·","GER":"рџ‡©рџ‡Є","ESP":"рџ‡Єрџ‡ё","POR":"рџ‡µрџ‡№","NED":"рџ‡ірџ‡±","ITA":"рџ‡®рџ‡№","BEL":"рџ‡§рџ‡Є","CRO":"рџ‡­рџ‡·","SUI":"рџ‡Ёрџ‡­","DEN":"рџ‡©рџ‡°","POL":"рџ‡µрџ‡±","SRB":"рџ‡·рџ‡ё","CZE":"рџ‡Ёрџ‡ї","AUT":"рџ‡¦рџ‡№","TUR":"рџ‡№рџ‡·","NOR":"рџ‡ірџ‡ґ","SWE":"рџ‡ёрџ‡Є","UKR":"рџ‡єрџ‡¦","HUN":"рџ‡­рџ‡є","ROU":"рџ‡·рџ‡ґ","GRE":"рџ‡¬рџ‡·","IRL":"рџ‡®рџ‡Є","SVK":"рџ‡ёрџ‡°","SVN":"рџ‡ёрџ‡®","FIN":"рџ‡«рџ‡®","ALB":"рџ‡¦рџ‡±","BUL":"рџ‡§рџ‡¬","ISL":"рџ‡®рџ‡ё","MAR":"рџ‡Ірџ‡¦","SEN":"рџ‡ёрџ‡і","EGY":"рџ‡Єрџ‡¬","NGA":"рџ‡ірџ‡¬","GHA":"рџ‡¬рџ‡­","CIV":"рџ‡Ёрџ‡®","ALG":"рџ‡©рџ‡ї","TUN":"рџ‡№рџ‡і","CMR":"рџ‡Ёрџ‡І","MLI":"рџ‡Ірџ‡±","RSA":"рџ‡їрџ‡¦","ANG":"рџ‡¦рџ‡ґ","BFA":"рџ‡§рџ‡«","CPV":"рџ‡Ёрџ‡»","JPN":"рџ‡Їрџ‡µ","KOR":"рџ‡°рџ‡·","IRN":"рџ‡®рџ‡·","AUS":"рџ‡¦рџ‡є","KSA":"рџ‡ёрџ‡¦","IRQ":"рџ‡®рџ‡¶","UAE":"рџ‡¦рџ‡Є","QAT":"рџ‡¶рџ‡¦","UZB":"рџ‡єрџ‡ї","JOR":"рџ‡Їрџ‡ґ","CHN":"рџ‡Ёрџ‡і","THA":"рџ‡№рџ‡­","CRC":"рџ‡Ёрџ‡·","JAM":"рџ‡Їрџ‡І","PAN":"рџ‡µрџ‡¦","HON":"рџ‡­рџ‡і","SLV":"рџ‡ёрџ‡»","HAI":"рџ‡­рџ‡№","TRI":"рџ‡№рџ‡№","CUB":"рџ‡Ёрџ‡є","CUR":"рџ‡Ёрџ‡ј","NZL":"рџ‡ірџ‡ї","BIH":"рџ‡§рџ‡¦","RUS":"рџ‡·рџ‡є","ISR":"рџ‡®рџ‡±","GEO":"рџ‡¬рџ‡Є","ARM":"рџ‡¦рџ‡І","AZE":"рџ‡¦рџ‡ї","MNE":"рџ‡Ірџ‡Є","MKD":"рџ‡Ірџ‡°","KAZ":"рџ‡°рџ‡ї","BLR":"рџ‡§рџ‡ѕ","LUX":"рџ‡±рџ‡є","CYP":"рџ‡Ёрџ‡ѕ","MLT":"рџ‡Ірџ‡№","MDA":"рџ‡Ірџ‡©","GUI":"рџ‡¬рџ‡і","GAM":"рџ‡¬рџ‡І","ZAM":"рџ‡їрџ‡І","ZIM":"рџ‡їрџ‡ј","MOZ":"рџ‡Ірџ‡ї","MAD":"рџ‡Ірџ‡¬","BEN":"рџ‡§рџ‡Ї","TOG":"рџ‡№рџ‡¬","CGO":"рџ‡Ёрџ‡¬","COD":"рџ‡Ёрџ‡©","GAB":"рџ‡¬рџ‡¦","UGA":"рџ‡єрџ‡¬","KEN":"рџ‡°рџ‡Є","TAN":"рџ‡№рџ‡ї","ETH":"рџ‡Єрџ‡№","SUD":"рџ‡ёрџ‡©","LBY":"рџ‡±рџ‡ѕ","MTN":"рџ‡Ірџ‡·","NIG":"рџ‡ірџ‡Є","SLE":"рџ‡ёрџ‡±","LBR":"рџ‡±рџ‡·","GNB":"рџ‡¬рџ‡ј","BDI":"рџ‡§рџ‡®","RWA":"рџ‡·рџ‡ј","COM":"рџ‡°рџ‡І","BHR":"рџ‡§рџ‡­","OMA":"рџ‡ґрџ‡І","KUW":"рџ‡°рџ‡ј","YEM":"рџ‡ѕрџ‡Є","LIB":"рџ‡±рџ‡§","SYR":"рџ‡ёрџ‡ѕ","PLE":"рџ‡µрџ‡ё","AFG":"рџ‡¦рџ‡«","IND":"рџ‡®рџ‡і","PAK":"рџ‡µрџ‡°","BAN":"рџ‡§рџ‡©","VIE":"рџ‡»рџ‡і","MAS":"рџ‡Ірџ‡ѕ","SIN":"рџ‡ёрџ‡¬","INA":"рџ‡®рџ‡©","PHI":"рџ‡µрџ‡­","MYA":"рџ‡Ірџ‡І","PRK":"рџ‡°рџ‡µ","TPE":"рџ‡№рџ‡ј","HKG":"рџ‡­рџ‡°","MAC":"рџ‡Ірџ‡ґ","TKM":"рџ‡№рџ‡І","TJK":"рџ‡№рџ‡Ї","KGZ":"рџ‡°рџ‡¬","GUA":"рџ‡¬рџ‡№","NCA":"рџ‡ірџ‡®","BLZ":"рџ‡§рџ‡ї","DOM":"рџ‡©рџ‡ґ","BAH":"рџ‡§рџ‡ё","BRB":"рџ‡§рџ‡§","GRN":"рџ‡¬рџ‡©","GUY":"рџ‡¬рџ‡ѕ","SUR":"рџ‡ёрџ‡·","FIJ":"рџ‡«рџ‡Ї","PNG":"рџ‡µрџ‡¬","SOL":"рџ‡ёрџ‡§","VAN":"рџ‡»рџ‡є","TAH":"рџ‡µрџ‡«","NCL":"рџ‡ірџ‡Ё","SAM":"рџ‡јрџ‡ё","TGA":"рџ‡№рџ‡ґ"};

const START="2026-06-11", END="2026-07-19";
const SCOREBOARD="https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=";
const SUMMARY="https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/summary?event=";
const REFRESH_MS=30000;
const $=(id)=>document.getElementById(id);
const dateInput=$("date");
const finalDetails={};
let current, timer=null;

function todayStr(){ const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }
function clampDate(s){ return s<START?START:s>END?END:s; }
function compact(s){ return s.replaceAll("-",""); }
function dayLabel(iso){ return new Date(iso).toLocaleDateString([], {weekday:"long", month:"long", day:"numeric"}); }
function dayLabelStr(s){ const [y,m,d]=s.split("-").map(Number); return new Date(y,m-1,d).toLocaleDateString([], {weekday:"long", month:"long", day:"numeric"}); }
function timeLabel(iso){ return new Date(iso).toLocaleTimeString([], {hour:"numeric", minute:"2-digit"}); }
function esc(s){ return (s ?? "").toString().replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function flag(a){ return FLAGS[(a||"").toUpperCase()] || "вљЅ"; }
function teamInfo(c){ const t=c.team||{}; return {name:t.shortDisplayName||t.displayName||t.name||"TBD", abbr:t.abbreviation||"", score:c.score??""}; }

function pName(p){ const a=(p&&p.athlete)?p.athlete:p; return (a&&(a.displayName||a.shortName))||""; }
function parseAssist(text){
  const low=(text||"").toLowerCase(); const i=low.indexOf("assisted by"); if(i<0) return "";
  let tail=text.slice(i+"assisted by".length).replace(/^[\s:]+/,"");
  for(const stop of [".", " with ", " following ", " after "]){ const j=tail.toLowerCase().indexOf(stop); if(j>=0) tail=tail.slice(0,j); }
  return tail.replace(/^[\s.,:]+|[\s.,:]+$/g,"");
}
function teamStats(grp){
  const m={}; (grp.statistics||[]).forEach(s=>{ m[s.name]=s.displayValue; });
  const pos=(m.possessionPct!=null && m.possessionPct!=="")?Math.round(parseFloat(m.possessionPct))+"%":"вЂ“";
  return { SHT:m.totalShots??"вЂ“", SOT:m.shotsOnTarget??"вЂ“", POS:pos, COR:m.wonCorners??"вЂ“" };
}
function parseDetails(data){
  const goals=[], cards=[], stats={}; const abbrById={};
  const hc=(((data.header||{}).competitions||[{}])[0].competitors)||[];
  hc.forEach(c=>{ const t=c.team||{}; if(t.id) abbrById[String(t.id)]=t.abbreviation||""; });
  ((data.boxscore||{}).teams||[]).forEach(grp=>{ const a=(grp.team||{}).abbreviation; if(a) stats[a]=teamStats(grp); });
  (data.keyEvents||[]).forEach(ev=>{
    const ty=(((ev.type||{}).type)||((ev.type||{}).text)||"").toLowerCase();
    const clock=((ev.clock||{}).displayValue)||"";
    const abbr=abbrById[String((ev.team||{}).id||"")]||"";
    const parts=ev.participants||ev.athletesInvolved||[];
    const text=ev.text||ev.shortText||"";
    if(ty.includes("goal")||ev.scoringPlay){
      const scorer=parts[0]?pName(parts[0]):""; let assist=parts[1]?pName(parts[1]):""; if(!assist) assist=parseAssist(text);
      if(scorer) goals.push({abbr,scorer,assist,clock});
    } else if(ty.includes("card")){
      const color=ty.includes("red")?"рџџҐ":"рџџЁ"; const player=parts[0]?pName(parts[0]):"";
      if(player) cards.push({abbr,player,color,clock});
    }
  });
  return {goals,cards,stats};
}
async function fetchDetails(id){
  try{ const r=await fetch(SUMMARY+id,{cache:"no-store"}); if(!r.ok) return {goals:[],cards:[],stats:{}}; return parseDetails(await r.json()); }
  catch(e){ return {goals:[],cards:[],stats:{}}; }
}

function statCols(s){
  if(!s) return "";
  return `<div class="stats">
    <div class="st"><span class="lbl">SHT</span><span class="val">${esc(s.SHT)}</span></div>
    <div class="st"><span class="lbl">SOT</span><span class="val">${esc(s.SOT)}</span></div>
    <div class="st"><span class="lbl">POS</span><span class="val">${esc(s.POS)}</span></div>
    <div class="st"><span class="lbl">COR</span><span class="val">${esc(s.COR)}</span></div>
  </div>`;
}
function teamRow(side, t, stats, scoreHtml){
  return `<div class="row">
    <div class="side"><span class="tag">${side}</span><span class="flag">${flag(t.abbr)}</span></div>
    <div class="name">${esc(t.name)}</div>
    ${statCols(stats)}
    <div class="scorecol">${scoreHtml}</div>
  </div>`;
}
function renderGame(ev, details){
  const comp=(ev.competitions||[])[0]||{}; const cs=comp.competitors||[];
  const home=teamInfo(cs.find(c=>c.homeAway==="home")||cs[0]||{});
  const away=teamInfo(cs.find(c=>c.homeAway==="away")||cs[1]||{});
  const type=(comp.status||ev.status||{}).type||{};
  const clock=(comp.status||ev.status||{}).displayClock||"";
  const state=type.state||"pre";
  let ghead, homeScore, awayScore;
  if(state==="in"){
    ghead=`<span class="live"><span class="pulse">в—Џ</span> ${esc(clock||type.shortDetail||"LIVE")}</span>`;
    homeScore=`<div class="scorebig">${esc(home.score)}</div>`; awayScore=`<div class="scorebig">${esc(away.score)}</div>`;
  } else if(state==="post"||type.completed){
    ghead=`Full time`;
    homeScore=`<div class="scorebig">${esc(home.score)}</div>`; awayScore=`<div class="scorebig">${esc(away.score)}</div>`;
  } else {
    ghead=esc(timeLabel(ev.date));
    homeScore=`<div class="scoretime">${esc(timeLabel(ev.date))}</div>`; awayScore=`<div class="scoretime">&nbsp;</div>`;
  }
  const hs=details.stats?details.stats[home.abbr]:null;
  const as=details.stats?details.stats[away.abbr]:null;
  const rows=[]; const v=comp.venue||{}; const addr=v.address||{};
  const venue=[v.fullName, addr.city, addr.country].filter(Boolean).join(", ");
  if(venue) rows.push(`<div class="venue">${esc(venue)}</div>`);
  (details.goals||[]).forEach(g=>{ const mn=g.clock?` ${esc(g.clock)}`:""; const a=g.assist?` <i>(${esc(g.assist)})</i>`:""; rows.push(`<div class="ev">вљЅ${mn} ${flag(g.abbr)} ${esc(g.scorer)}${a}</div>`); });
  (details.cards||[]).forEach(c=>{ const mn=c.clock?` ${esc(c.clock)}`:""; rows.push(`<div class="ev">${c.color}${mn} ${flag(c.abbr)} ${esc(c.player)}</div>`); });
  const meta=rows.length?`<div class="meta">${rows.join("")}</div>`:"";
  return `<div class="game"><div class="ghead">${ghead}</div>${teamRow("HOME",home,hs,homeScore)}${teamRow("AWAY",away,as,awayScore)}${meta}</div>`;
}

async function load(){
  dateInput.value=current;
  $("prev").disabled=current<=START; $("next").disabled=current>=END;
  $("titledate").innerHTML = dayLabelStr(current);
  try{
    const res=await fetch(SCOREBOARD+compact(current),{cache:"no-store"});
    if(!res.ok) throw new Error("HTTP "+res.status);
    const data=await res.json();
    const events=(data.events||[]).slice().sort((a,b)=>(a.date||"").localeCompare(b.date||""));
    if(!events.length){ $("list").innerHTML=`<div class="note">No matches scheduled for this day.</div>`; $("tagline").innerHTML="Stay tuned&hellip;"; $("tagline").className="tagline"; return; }
    let anyLive=false;
    const enriched=await Promise.all(events.map(async ev=>{
      const comp=(ev.competitions||[])[0]||{}; const type=(comp.status||ev.status||{}).type||{}; const state=type.state||"pre";
      if(state==="in") anyLive=true;
      let details={goals:[],cards:[],stats:{}};
      if(state==="post"||type.completed){ details=finalDetails[ev.id]||(finalDetails[ev.id]=await fetchDetails(ev.id)); }
      else if(state==="in"){ details=await fetchDetails(ev.id); }
      return {ev, details};
    }));
    $("list").innerHTML=enriched.map(x=>renderGame(x.ev, x.details)).join("");
    const tag=$("tagline");
    if(anyLive){ tag.className="tagline live"; tag.innerHTML="в—Џ Live now"; }
    else { tag.className="tagline"; tag.innerHTML="Stay tuned&hellip;"; }
  }catch(e){
    $("list").innerHTML=`<div class="note">Couldn't load scores. RetryingвЂ¦</div>`;
  }
}

function go(s){ current=clampDate(s); load(); restartTimer(); }
function shift(days){ const [y,m,d]=current.split("-").map(Number); const dt=new Date(y,m-1,d+days); go(`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,"0")}-${String(dt.getDate()).padStart(2,"0")}`); }
function restartTimer(){ if(timer) clearInterval(timer); timer=setInterval(load, REFRESH_MS); }

$("prev").onclick=()=>shift(-1);
$("next").onclick=()=>shift(1);
$("today").onclick=()=>go(todayStr());
dateInput.onchange=(e)=>go(e.target.value);
document.addEventListener("visibilitychange", ()=>{ if(!document.hidden) load(); });

current=clampDate(todayStr());
go(current);
</script>
</body>
