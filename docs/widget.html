<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>World Cup 2026 — Scoreboard widget</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --paper: #e9e6dd;     /* cream body */
    --ink: #16130d;       /* near-black */
    --barText: #f1ede3;
    --line: rgba(22,19,13,.16);
    --line-strong: rgba(22,19,13,.85);
    --muted: rgba(22,19,13,.52);
    --live: #c1352a;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--ink);
    background: var(--paper);
    -webkit-font-smoothing: antialiased;
  }

  /* top black bar */
  .topbar {
    background: var(--ink); color: var(--barText);
    display: flex; align-items: center; justify-content: space-between;
    padding: clamp(9px,2.4vw,12px) clamp(13px,3.4vw,18px);
  }
  .brand { display: flex; align-items: center; gap: 8px; font-weight: 800; letter-spacing: .02em; font-size: clamp(13px,2.8vw,15px); }
  .brand .mark {
    display: inline-grid; place-items: center; width: 22px; height: 22px;
    border-radius: 5px; background: var(--barText); color: var(--ink);
    font-size: 13px; font-weight: 900;
  }
  .season { font-size: clamp(10px,2.3vw,12px); font-weight: 700; letter-spacing: .14em; opacity: .85; text-transform: uppercase; }

  .content { padding: clamp(12px,3vw,18px) clamp(13px,3.4vw,20px) clamp(10px,2.6vw,16px); }

  /* title row */
  .titlerow { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 4px; }
  .title { font-weight: 800; font-size: clamp(18px,4.6vw,26px); letter-spacing: -.02em; line-height: 1.05; }
  .titledate { text-align: right; font-weight: 700; font-size: clamp(11px,2.5vw,13px); line-height: 1.25; white-space: nowrap; }
  .titledate .live { color: var(--live); }

  .daysep {
    margin: 14px 0 2px; font-size: clamp(10px,2.3vw,12px); font-weight: 800;
    letter-spacing: .12em; text-transform: uppercase; color: var(--muted);
  }

  .game { margin-top: 8px; }
  .ghead {
    display: flex; justify-content: flex-end;
    font-size: clamp(10px,2.3vw,12px); font-weight: 800; letter-spacing: .08em;
    text-transform: uppercase; color: var(--muted); padding: 2px 0;
  }
  .ghead .live { color: var(--live); }

  .row {
    display: grid;
    grid-template-columns: auto minmax(0,1fr) auto auto;
    align-items: center;
    gap: clamp(8px,2.4vw,16px);
    padding: clamp(7px,1.8vw,11px) 0;
    border-top: 1px solid var(--line);
  }
  .game .row:first-of-type { border-top: 1.5px solid var(--line-strong); }
  .game .meta { border-top: 1px solid var(--line); }

  .side { display: flex; flex-direction: column; align-items: center; gap: 3px; width: clamp(34px,9vw,46px); }
  .tag {
    background: var(--ink); color: var(--barText);
    font-size: 7.5px; font-weight: 800; letter-spacing: .1em;
    padding: 2px 5px; border-radius: 3px; line-height: 1;
  }
  .flag { font-size: clamp(1.4rem,5.2vw,1.9rem); line-height: 1; }

  .name {
    font-weight: 800; letter-spacing: -.025em;
    font-size: clamp(1.35rem,6vw,2.3rem); line-height: 1;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  .stats { display: flex; gap: clamp(8px,2.4vw,18px); }
  .st { display: flex; flex-direction: column; align-items: center; gap: 2px; min-width: 22px; }
  .st .lbl { font-size: 8.5px; font-weight: 800; letter-spacing: .08em; color: var(--muted); }
  .st .val { font-size: clamp(12px,2.7vw,15px); font-weight: 700; font-variant-numeric: tabular-nums; }

  .scorecol { text-align: right; min-width: clamp(38px,11vw,66px); }
  .scorebig { font-weight: 900; letter-spacing: -.03em; font-size: clamp(1.7rem,7.5vw,2.7rem); line-height: .95; font-variant-numeric: tabular-nums; }
  .scoretime { font-weight: 800; font-size: clamp(12px,2.8vw,15px); white-space: nowrap; }

  .meta { padding: 8px 0 2px; display: flex; flex-direction: column; gap: 3px; }
  .meta .venue { font-size: clamp(10px,2.3vw,12px); font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: var(--muted); }
  .meta .ev { font-size: clamp(11px,2.4vw,13px); }
  .meta .ev i { color: var(--muted); font-style: normal; }

  /* footer */
  .foot {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    margin-top: 14px; padding-top: 12px; border-top: 1.5px solid var(--line-strong);
  }
  .navlinks { display: flex; align-items: center; gap: clamp(10px,2.8vw,18px); }
  .burger { display: inline-flex; flex-direction: column; gap: 3px; }
  .burger span { width: 16px; height: 1.5px; background: var(--ink); }
  .navlinks a { color: var(--ink); text-decoration: none; font-size: clamp(10px,2.3vw,12px); font-weight: 800; letter-spacing: .1em; text-transform: uppercase; }
  .navlinks a:hover { opacity: .6; }
  .tagline { font-weight: 800; font-style: italic; font-size: clamp(13px,3vw,17px); letter-spacing: -.01em; }
  .tagline.live { color: var(--live); font-style: normal; }

  .note { color: var(--muted); font-weight: 600; padding: 26px 0; text-align: center; }

  /* hide stat columns on narrow embeds so the big names/scores keep priority */
  @media (max-width: 560px) { .stats { display: none; } }
  @media (prefers-reduced-motion: reduce) { .pulse { animation: none; } }
  .pulse { animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }
</style>
</head>
<body>
  <div class="topbar">
    <div class="brand"><span class="mark">W</span> WORLD CUP</div>
    <div class="season">FIFA &rsquo;26</div>
  </div>
  <div class="content">
    <div class="titlerow">
      <div class="title">Latest Scores</div>
      <div class="titledate" id="titledate"></div>
    </div>
    <div id="list"><div class="note">Loading…</div></div>
    <div class="foot">
      <div class="navlinks">
        <span class="burger" aria-hidden="true"><span></span><span></span><span></span></span>
        <a href="scoreboard.html" target="_blank" rel="noopener">Scoreboard</a>
        <a href="world_cup_2026.ics" target="_blank" rel="noopener">Calendar</a>
      </div>
      <div class="tagline" id="tagline">Stay tuned&hellip;</div>
    </div>
  </div>

<script>
const FLAGS = {"USA":"🇺🇸","CAN":"🇨🇦","MEX":"🇲🇽","ARG":"🇦🇷","BRA":"🇧🇷","URU":"🇺🇾","COL":"🇨🇴","ECU":"🇪🇨","PAR":"🇵🇾","CHI":"🇨🇱","PER":"🇵🇪","VEN":"🇻🇪","BOL":"🇧🇴","ENG":"🏴󠁧󠁢󠁥󠁮󠁧󠁿","SCO":"🏴󠁧󠁢󠁳󠁣󠁴󠁿","WAL":"🏴󠁧󠁢󠁷󠁬󠁳󠁿","NIR":"🇬🇧","FRA":"🇫🇷","GER":"🇩🇪","ESP":"🇪🇸","POR":"🇵🇹","NED":"🇳🇱","ITA":"🇮🇹","BEL":"🇧🇪","CRO":"🇭🇷","SUI":"🇨🇭","DEN":"🇩🇰","POL":"🇵🇱","SRB":"🇷🇸","CZE":"🇨🇿","AUT":"🇦🇹","TUR":"🇹🇷","NOR":"🇳🇴","SWE":"🇸🇪","UKR":"🇺🇦","HUN":"🇭🇺","ROU":"🇷🇴","GRE":"🇬🇷","IRL":"🇮🇪","SVK":"🇸🇰","SVN":"🇸🇮","FIN":"🇫🇮","ALB":"🇦🇱","BUL":"🇧🇬","ISL":"🇮🇸","MAR":"🇲🇦","SEN":"🇸🇳","EGY":"🇪🇬","NGA":"🇳🇬","GHA":"🇬🇭","CIV":"🇨🇮","ALG":"🇩🇿","TUN":"🇹🇳","CMR":"🇨🇲","MLI":"🇲🇱","RSA":"🇿🇦","ANG":"🇦🇴","BFA":"🇧🇫","CPV":"🇨🇻","JPN":"🇯🇵","KOR":"🇰🇷","IRN":"🇮🇷","AUS":"🇦🇺","KSA":"🇸🇦","IRQ":"🇮🇶","UAE":"🇦🇪","QAT":"🇶🇦","UZB":"🇺🇿","JOR":"🇯🇴","CHN":"🇨🇳","THA":"🇹🇭","CRC":"🇨🇷","JAM":"🇯🇲","PAN":"🇵🇦","HON":"🇭🇳","SLV":"🇸🇻","HAI":"🇭🇹","TRI":"🇹🇹","CUB":"🇨🇺","CUR":"🇨🇼","NZL":"🇳🇿","BIH":"🇧🇦","RUS":"🇷🇺","ISR":"🇮🇱","GEO":"🇬🇪","ARM":"🇦🇲","AZE":"🇦🇿","MNE":"🇲🇪","MKD":"🇲🇰","KAZ":"🇰🇿","BLR":"🇧🇾","LUX":"🇱🇺","CYP":"🇨🇾","MLT":"🇲🇹","MDA":"🇲🇩","GUI":"🇬🇳","GAM":"🇬🇲","ZAM":"🇿🇲","ZIM":"🇿🇼","MOZ":"🇲🇿","MAD":"🇲🇬","BEN":"🇧🇯","TOG":"🇹🇬","CGO":"🇨🇬","COD":"🇨🇩","GAB":"🇬🇦","UGA":"🇺🇬","KEN":"🇰🇪","TAN":"🇹🇿","ETH":"🇪🇹","SUD":"🇸🇩","LBY":"🇱🇾","MTN":"🇲🇷","NIG":"🇳🇪","SLE":"🇸🇱","LBR":"🇱🇷","GNB":"🇬🇼","BDI":"🇧🇮","RWA":"🇷🇼","COM":"🇰🇲","BHR":"🇧🇭","OMA":"🇴🇲","KUW":"🇰🇼","YEM":"🇾🇪","LIB":"🇱🇧","SYR":"🇸🇾","PLE":"🇵🇸","AFG":"🇦🇫","IND":"🇮🇳","PAK":"🇵🇰","BAN":"🇧🇩","VIE":"🇻🇳","MAS":"🇲🇾","SIN":"🇸🇬","INA":"🇮🇩","PHI":"🇵🇭","MYA":"🇲🇲","PRK":"🇰🇵","TPE":"🇹🇼","HKG":"🇭🇰","MAC":"🇲🇴","TKM":"🇹🇲","TJK":"🇹🇯","KGZ":"🇰🇬","GUA":"🇬🇹","NCA":"🇳🇮","BLZ":"🇧🇿","DOM":"🇩🇴","BAH":"🇧🇸","BRB":"🇧🇧","GRN":"🇬🇩","GUY":"🇬🇾","SUR":"🇸🇷","FIJ":"🇫🇯","PNG":"🇵🇬","SOL":"🇸🇧","VAN":"🇻🇺","TAH":"🇵🇫","NCL":"🇳🇨","SAM":"🇼🇸","TGA":"🇹🇴"};

const SCOREBOARD = "https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=";
const SUMMARY = "https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/summary?event=";
const REFRESH_MS = 30000;
const $ = (id) => document.getElementById(id);
const finalDetails = {}; // finished matches never change -> cache parsed details

function compactOf(d){ return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}`; }
function dayLabel(iso){ return new Date(iso).toLocaleDateString([], {weekday:"long", month:"long", day:"numeric"}); }
function timeLabel(iso){ return new Date(iso).toLocaleTimeString([], {hour:"numeric", minute:"2-digit"}); }
function esc(s){ return (s ?? "").toString().replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function flag(a){ return FLAGS[(a||"").toUpperCase()] || "⚽"; }
function teamInfo(c){ const t=c.team||{}; return {name:t.shortDisplayName||t.displayName||t.name||"TBD", abbr:t.abbreviation||"", score:c.score??""}; }

// ---- summary parsing: goals / assists / cards / team stats ----
function pName(p){ const a=(p&&p.athlete)?p.athlete:p; return (a&&(a.displayName||a.shortName))||""; }
function parseAssist(text){
  const low=(text||"").toLowerCase(); const i=low.indexOf("assisted by"); if(i<0) return "";
  let tail=text.slice(i+"assisted by".length).replace(/^[\s:]+/,"");
  for(const stop of [".", " with ", " following ", " after "]){ const j=tail.toLowerCase().indexOf(stop); if(j>=0) tail=tail.slice(0,j); }
  return tail.replace(/^[\s.,:]+|[\s.,:]+$/g,"");
}
function teamStats(grp){
  const m={}; (grp.statistics||[]).forEach(s=>{ m[s.name]=s.displayValue; });
  const pos = (m.possessionPct!=null && m.possessionPct!=="") ? Math.round(parseFloat(m.possessionPct))+"%" : "–";
  return { SHT:m.totalShots??"–", SOT:m.shotsOnTarget??"–", POS:pos, COR:m.wonCorners??"–" };
}
function parseDetails(data){
  const goals=[], cards=[], stats={};
  const abbrById={};
  const hc=(((data.header||{}).competitions||[{}])[0].competitors)||[];
  hc.forEach(c=>{ const t=c.team||{}; if(t.id) abbrById[String(t.id)]=t.abbreviation||""; });
  ((data.boxscore||{}).teams||[]).forEach(grp=>{ const a=(grp.team||{}).abbreviation; if(a) stats[a]=teamStats(grp); });
  (data.keyEvents||[]).forEach(ev=>{
    const ty=(((ev.type||{}).type)||((ev.type||{}).text)||"").toLowerCase();
    const clock=((ev.clock||{}).displayValue)||"";
    const abbr=abbrById[String((ev.team||{}).id||"")]||"";
    const parts=ev.participants||ev.athletesInvolved||[];
    const text=ev.text||ev.shortText||"";
    if(ty.includes("goal")||ev.scoringPlay){
      const scorer=parts[0]?pName(parts[0]):"";
      let assist=parts[1]?pName(parts[1]):""; if(!assist) assist=parseAssist(text);
      if(scorer) goals.push({abbr,scorer,assist,clock});
    } else if(ty.includes("card")){
      const color=ty.includes("red")?"🟥":"🟨";
      const player=parts[0]?pName(parts[0]):"";
      if(player) cards.push({abbr,player,color,clock});
    }
  });
  return {goals,cards,stats};
}
async function fetchDetails(id){
  try{ const r=await fetch(SUMMARY+id,{cache:"no-store"}); if(!r.ok) return {goals:[],cards:[],stats:{}}; return parseDetails(await r.json()); }
  catch(e){ return {goals:[],cards:[],stats:{}}; }
}

function statCols(s){
  if(!s) return "";
  return `<div class="stats">
    <div class="st"><span class="lbl">SHT</span><span class="val">${esc(s.SHT)}</span></div>
    <div class="st"><span class="lbl">SOT</span><span class="val">${esc(s.SOT)}</span></div>
    <div class="st"><span class="lbl">POS</span><span class="val">${esc(s.POS)}</span></div>
    <div class="st"><span class="lbl">COR</span><span class="val">${esc(s.COR)}</span></div>
  </div>`;
}

function teamRow(side, t, stats, scoreHtml){
  return `<div class="row">
    <div class="side"><span class="tag">${side}</span><span class="flag">${flag(t.abbr)}</span></div>
    <div class="name">${esc(t.name)}</div>
    ${statCols(stats)}
    <div class="scorecol">${scoreHtml}</div>
  </div>`;
}

function renderGame(ev, details){
  const comp=(ev.competitions||[])[0]||{};
  const cs=comp.competitors||[];
  const home=teamInfo(cs.find(c=>c.homeAway==="home")||cs[0]||{});
  const away=teamInfo(cs.find(c=>c.homeAway==="away")||cs[1]||{});
  const type=(comp.status||ev.status||{}).type||{};
  const clock=(comp.status||ev.status||{}).displayClock||"";
  const state=type.state||"pre";

  let ghead, homeScore, awayScore;
  if(state==="in"){
    ghead=`<span class="live"><span class="pulse">●</span> ${esc(clock||type.shortDetail||"LIVE")}</span>`;
    homeScore=`<div class="scorebig">${esc(home.score)}</div>`;
    awayScore=`<div class="scorebig">${esc(away.score)}</div>`;
  } else if(state==="post"||type.completed){
    ghead=`Full time`;
    homeScore=`<div class="scorebig">${esc(home.score)}</div>`;
    awayScore=`<div class="scorebig">${esc(away.score)}</div>`;
  } else {
    ghead=esc(timeLabel(ev.date));
    homeScore=`<div class="scoretime">${esc(timeLabel(ev.date))}</div>`;
    awayScore=`<div class="scoretime">&nbsp;</div>`;
  }

  const hs=details.stats?details.stats[home.abbr]:null;
  const as=details.stats?details.stats[away.abbr]:null;

  const rows=[];
  const v=comp.venue||{}; const addr=v.address||{};
  const venue=[v.fullName, addr.city, addr.country].filter(Boolean).join(", ");
  if(venue) rows.push(`<div class="venue">${esc(venue)}</div>`);
  (details.goals||[]).forEach(g=>{
    const mn=g.clock?` ${esc(g.clock)}`:"";
    const a=g.assist?` <i>(${esc(g.assist)})</i>`:"";
    rows.push(`<div class="ev">⚽${mn} ${flag(g.abbr)} ${esc(g.scorer)}${a}</div>`);
  });
  (details.cards||[]).forEach(c=>{
    const mn=c.clock?` ${esc(c.clock)}`:"";
    rows.push(`<div class="ev">${c.color}${mn} ${flag(c.abbr)} ${esc(c.player)}</div>`);
  });
  const meta=rows.length?`<div class="meta">${rows.join("")}</div>`:"";

  return `<div class="game">
    <div class="ghead">${ghead}</div>
    ${teamRow("HOME", home, hs, homeScore)}
    ${teamRow("AWAY", away, as, awayScore)}
    ${meta}
  </div>`;
}

function postHeight(){
  const h=document.documentElement.scrollHeight;
  try{ parent.postMessage({type:"wc-widget-height", height:h}, "*"); }catch(e){}
}

async function load(){
  try{
    const now=new Date();
    const yest=new Date(now); yest.setDate(now.getDate()-1);
    const days=await Promise.all([compactOf(yest), compactOf(now)].map(d=>
      fetch(SCOREBOARD+d,{cache:"no-store"}).then(r=>r.ok?r.json():{events:[]}).catch(()=>({events:[]}))
    ));
    const seen=new Set(); const events=[];
    days.forEach(d=>(d.events||[]).forEach(ev=>{ const id=String(ev.id||""); if(id&&!seen.has(id)){ seen.add(id); events.push(ev); } }));
    events.sort((a,b)=>(a.date||"").localeCompare(b.date||""));

    $("titledate").innerHTML = now.toLocaleDateString([], {month:"numeric", day:"numeric"}) +
      `<br>${now.toLocaleTimeString([], {hour:"numeric", minute:"2-digit"})}`;

    if(!events.length){ $("list").innerHTML=`<div class="note">No matches in the last 24h.</div>`; postHeight(); return; }

    let anyLive=false;
    const enriched=await Promise.all(events.map(async ev=>{
      const comp=(ev.competitions||[])[0]||{};
      const type=(comp.status||ev.status||{}).type||{};
      const state=type.state||"pre";
      if(state==="in") anyLive=true;
      let details={goals:[],cards:[],stats:{}};
      if(state==="post"||type.completed){ details=finalDetails[ev.id]||(finalDetails[ev.id]=await fetchDetails(ev.id)); }
      else if(state==="in"){ details=await fetchDetails(ev.id); }
      return {ev, details};
    }));

    let html="", last="";
    enriched.forEach(x=>{
      const lbl=dayLabel(x.ev.date);
      if(lbl!==last){ html+=`<div class="daysep">${esc(lbl)}</div>`; last=lbl; }
      html+=renderGame(x.ev, x.details);
    });
    $("list").innerHTML=html;

    const tag=$("tagline");
    if(anyLive){ tag.className="tagline live"; tag.innerHTML="● Live now"; }
    else { tag.className="tagline"; tag.innerHTML="Stay tuned&hellip;"; }
  }catch(e){
    $("list").innerHTML=`<div class="note">Couldn't load scores. Retrying…</div>`;
  }
  postHeight();
}

window.addEventListener("load", postHeight);
window.addEventListener("resize", postHeight);
document.addEventListener("visibilitychange", ()=>{ if(!document.hidden) load(); });
load();
setInterval(load, REFRESH_MS);
</script>
</body>
</html>
