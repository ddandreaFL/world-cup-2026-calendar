<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>World Cup 2026 — Today (widget)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #efe3cc; --card: #fbf5e9; --card2: #f3e7d0; --line: #d9c3a1;
    --text: #3b2a1c; --muted: #8a7256; --accent: #8a5a2b; --live: #b3402e; --win: #6b7d2e;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    font: 400 clamp(13px, 2.6vw, 15px)/1.4 "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--text);
    background: var(--bg);
    padding: clamp(8px, 2.5vw, 14px);
    text-align: center;
  }
  .wrap { width: 100%; max-width: 560px; margin: 0 auto; }
  .head {
    display: flex; flex-direction: column; align-items: center;
    gap: 2px; margin-bottom: 12px;
  }
  .title { font-weight: 700; font-size: clamp(15px, 3.2vw, 18px); }
  .title a { color: inherit; text-decoration: none; }
  .day { color: var(--muted); font-size: clamp(11px, 2.4vw, 13px); }
  .daygroup {
    text-align: center; color: var(--accent); font-weight: 600;
    font-size: clamp(11px, 2.4vw, 13px);
    letter-spacing: .3px; margin: 14px 0 6px;
  }
  .daygroup:first-child { margin-top: 2px; }
  .match {
    background: linear-gradient(180deg, var(--card), var(--card2));
    border: 1px solid var(--line);
    border-radius: 12px;
    box-shadow: 0 1px 3px rgba(59,42,28,.08);
    padding: clamp(8px, 2.2vw, 12px) clamp(10px, 2.6vw, 14px);
    margin: 8px 0;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: clamp(6px, 2vw, 10px);
  }
  .match.live { border-color: rgba(179,64,46,.55); box-shadow: 0 0 0 1px rgba(179,64,46,.18); }
  .team { display: flex; align-items: center; gap: 8px; min-width: 0; }
  .team.home { justify-content: flex-end; text-align: right; }
  .team.away { justify-content: flex-start; text-align: left; }
  .flag { font-size: clamp(1.2rem, 4.4vw, 1.5rem); line-height: 1; flex: none; }
  .tname { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
  .tname.winner { color: var(--win); font-weight: 700; }
  .center { text-align: center; min-width: clamp(58px, 16vw, 78px); }
  .score { font-size: clamp(1.05rem, 4vw, 1.35rem); font-weight: 700; letter-spacing: .5px; }
  .vs { color: var(--muted); font-weight: 600; }
  .badge { margin-top: 3px; font-size: clamp(10px, 2.2vw, 12px); color: var(--muted); white-space: nowrap; }
  .badge.live { color: var(--live); font-weight: 700; }
  .dot {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--live); margin-right: 4px; vertical-align: middle;
    animation: pulse 1.2s infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .25; } }
  .details {
    grid-column: 1 / -1;
    margin-top: 8px; padding-top: 8px;
    border-top: 1px dashed var(--line);
    font-size: clamp(11px, 2.3vw, 12.5px);
    color: var(--muted);
    display: flex; flex-direction: column; gap: 3px; align-items: center;
  }
  .ev { white-space: normal; }
  .ev .assist { color: var(--muted); opacity: .85; }
  .venue { font-style: italic; }
  .note { color: var(--muted); font-size: clamp(11px, 2.4vw, 13px); padding: 22px 0; }
  .foot { color: var(--muted); font-size: clamp(10px, 2.2vw, 12px); margin-top: 8px; }
  .foot a { color: var(--accent); text-decoration: none; }
  @media (prefers-reduced-motion: reduce) { .dot { animation: none; } }
</style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <div class="title"><a href="scoreboard.html" target="_blank" rel="noopener">⚽ World Cup 2026</a></div>
      <div class="day" id="day"></div>
    </div>
    <div id="list"><div class="note">Loading…</div></div>
    <div class="foot" id="foot"></div>
  </div>

<script>
const FLAGS = {"USA":"🇺🇸","CAN":"🇨🇦","MEX":"🇲🇽","ARG":"🇦🇷","BRA":"🇧🇷","URU":"🇺🇾","COL":"🇨🇴","ECU":"🇪🇨","PAR":"🇵🇾","CHI":"🇨🇱","PER":"🇵🇪","VEN":"🇻🇪","BOL":"🇧🇴","ENG":"🏴󠁧󠁢󠁥󠁮󠁧󠁿","SCO":"🏴󠁧󠁢󠁳󠁣󠁴󠁿","WAL":"🏴󠁧󠁢󠁷󠁬󠁳󠁿","NIR":"🇬🇧","FRA":"🇫🇷","GER":"🇩🇪","ESP":"🇪🇸","POR":"🇵🇹","NED":"🇳🇱","ITA":"🇮🇹","BEL":"🇧🇪","CRO":"🇭🇷","SUI":"🇨🇭","DEN":"🇩🇰","POL":"🇵🇱","SRB":"🇷🇸","CZE":"🇨🇿","AUT":"🇦🇹","TUR":"🇹🇷","NOR":"🇳🇴","SWE":"🇸🇪","UKR":"🇺🇦","HUN":"🇭🇺","ROU":"🇷🇴","GRE":"🇬🇷","IRL":"🇮🇪","SVK":"🇸🇰","SVN":"🇸🇮","FIN":"🇫🇮","ALB":"🇦🇱","BUL":"🇧🇬","ISL":"🇮🇸","MAR":"🇲🇦","SEN":"🇸🇳","EGY":"🇪🇬","NGA":"🇳🇬","GHA":"🇬🇭","CIV":"🇨🇮","ALG":"🇩🇿","TUN":"🇹🇳","CMR":"🇨🇲","MLI":"🇲🇱","RSA":"🇿🇦","ANG":"🇦🇴","BFA":"🇧🇫","CPV":"🇨🇻","JPN":"🇯🇵","KOR":"🇰🇷","IRN":"🇮🇷","AUS":"🇦🇺","KSA":"🇸🇦","IRQ":"🇮🇶","UAE":"🇦🇪","QAT":"🇶🇦","UZB":"🇺🇿","JOR":"🇯🇴","CHN":"🇨🇳","THA":"🇹🇭","CRC":"🇨🇷","JAM":"🇯🇲","PAN":"🇵🇦","HON":"🇭🇳","SLV":"🇸🇻","HAI":"🇭🇹","TRI":"🇹🇹","CUB":"🇨🇺","CUR":"🇨🇼","NZL":"🇳🇿","BIH":"🇧🇦","RUS":"🇷🇺","ISR":"🇮🇱","GEO":"🇬🇪","ARM":"🇦🇲","AZE":"🇦🇿","MNE":"🇲🇪","MKD":"🇲🇰","KAZ":"🇰🇿","BLR":"🇧🇾","LUX":"🇱🇺","CYP":"🇨🇾","MLT":"🇲🇹","MDA":"🇲🇩","GUI":"🇬🇳","GAM":"🇬🇲","ZAM":"🇿🇲","ZIM":"🇿🇼","MOZ":"🇲🇿","MAD":"🇲🇬","BEN":"🇧🇯","TOG":"🇹🇬","CGO":"🇨🇬","COD":"🇨🇩","GAB":"🇬🇦","UGA":"🇺🇬","KEN":"🇰🇪","TAN":"🇹🇿","ETH":"🇪🇹","SUD":"🇸🇩","LBY":"🇱🇾","MTN":"🇲🇷","NIG":"🇳🇪","SLE":"🇸🇱","LBR":"🇱🇷","GNB":"🇬🇼","BDI":"🇧🇮","RWA":"🇷🇼","COM":"🇰🇲","BHR":"🇧🇭","OMA":"🇴🇲","KUW":"🇰🇼","YEM":"🇾🇪","LIB":"🇱🇧","SYR":"🇸🇾","PLE":"🇵🇸","AFG":"🇦🇫","IND":"🇮🇳","PAK":"🇵🇰","BAN":"🇧🇩","VIE":"🇻🇳","MAS":"🇲🇾","SIN":"🇸🇬","INA":"🇮🇩","PHI":"🇵🇭","MYA":"🇲🇲","PRK":"🇰🇵","TPE":"🇹🇼","HKG":"🇭🇰","MAC":"🇲🇴","TKM":"🇹🇲","TJK":"🇹🇯","KGZ":"🇰🇬","GUA":"🇬🇹","NCA":"🇳🇮","BLZ":"🇧🇿","DOM":"🇩🇴","BAH":"🇧🇸","BRB":"🇧🇧","GRN":"🇬🇩","GUY":"🇬🇾","SUR":"🇸🇷","FIJ":"🇫🇯","PNG":"🇵🇬","SOL":"🇸🇧","VAN":"🇻🇺","TAH":"🇵🇫","NCL":"🇳🇨","SAM":"🇼🇸","TGA":"🇹🇴"};

const SCOREBOARD = "https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=";
const SUMMARY = "https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/summary?event=";
const REFRESH_MS = 30000;
const $ = (id) => document.getElementById(id);

function compactOf(d) {
  return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}`;
}
function dayLabel(iso) {
  return new Date(iso).toLocaleDateString([], { weekday: "long", month: "short", day: "numeric" });
}
// Finished matches never change -> cache their parsed details so we don't refetch each cycle.
const finalDetails = {};
function esc(s){ return (s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function flag(a){ return FLAGS[(a||"").toUpperCase()] || "⚽"; }
function kickoff(iso){ return new Date(iso).toLocaleTimeString([], {hour:"numeric", minute:"2-digit"}); }
function teamInfo(c){ const t=c.team||{}; return {name:t.shortDisplayName||t.displayName||t.name||"TBD", abbr:t.abbreviation||"", score:c.score??"", winner:!!c.winner}; }

function venueText(comp){
  const v = comp.venue || {};
  const addr = v.address || {};
  const parts = [v.fullName, addr.city, addr.country].filter(Boolean);
  return parts.join(", ");
}

// ---- summary parsing (goals / assists / cards), mirrors generate.py ----
function pName(p){ const a = (p && p.athlete) ? p.athlete : p; return (a && (a.displayName || a.shortName)) || ""; }
function parseAssist(text){
  const low = (text||"").toLowerCase();
  const i = low.indexOf("assisted by");
  if (i < 0) return "";
  let tail = text.slice(i + "assisted by".length).replace(/^[\s:]+/, "");
  for (const stop of [".", " with ", " following ", " after "]) {
    const j = tail.toLowerCase().indexOf(stop);
    if (j >= 0) tail = tail.slice(0, j);
  }
  return tail.replace(/^[\s.,:]+|[\s.,:]+$/g, "");
}
function parseDetails(data){
  const goals = [], cards = [];
  const abbrById = {};
  const hc = (((data.header||{}).competitions||[{}])[0].competitors)||[];
  hc.forEach(c => { const t=c.team||{}; if(t.id) abbrById[String(t.id)] = t.abbreviation||""; });
  (data.keyEvents||[]).forEach(ev => {
    const ty = (((ev.type||{}).type) || ((ev.type||{}).text) || "").toLowerCase();
    const clock = ((ev.clock||{}).displayValue) || "";
    const abbr = abbrById[String((ev.team||{}).id || "")] || "";
    const parts = ev.participants || ev.athletesInvolved || [];
    const text = ev.text || ev.shortText || "";
    if (ty.includes("goal") || ev.scoringPlay) {
      const scorer = parts[0] ? pName(parts[0]) : "";
      let assist = parts[1] ? pName(parts[1]) : "";
      if (!assist) assist = parseAssist(text);
      if (scorer) goals.push({ abbr, scorer, assist, clock });
    } else if (ty.includes("card")) {
      const color = ty.includes("red") ? "🟥" : "🟨";
      const player = parts[0] ? pName(parts[0]) : "";
      if (player) cards.push({ abbr, player, color, clock });
    }
  });
  return { goals, cards };
}
async function fetchDetails(id){
  try {
    const res = await fetch(SUMMARY + id, { cache: "no-store" });
    if (!res.ok) return { goals: [], cards: [] };
    return parseDetails(await res.json());
  } catch(e) { return { goals: [], cards: [] }; }
}

function renderMatch(ev, details){
  const comp = (ev.competitions||[])[0] || {};
  const cs = comp.competitors || [];
  const home = teamInfo(cs.find(c=>c.homeAway==="home")||cs[0]||{});
  const away = teamInfo(cs.find(c=>c.homeAway==="away")||cs[1]||{});
  const type = (comp.status||ev.status||{}).type || {};
  const clock = (comp.status||ev.status||{}).displayClock || "";
  const state = type.state || "pre";

  let center, badge;
  if (state === "in") {
    center = `<div class="score">${esc(home.score)}–${esc(away.score)}</div>`;
    badge = `<div class="badge live"><span class="dot"></span>${esc(clock||type.shortDetail||"LIVE")}</div>`;
  } else if (state === "post" || type.completed) {
    center = `<div class="score">${esc(home.score)}–${esc(away.score)}</div>`;
    badge = `<div class="badge">Full time</div>`;
  } else {
    center = `<div class="vs">vs</div>`;
    badge = `<div class="badge">${esc(kickoff(ev.date))}</div>`;
  }

  const rows = [];
  const venue = venueText(comp);
  if (venue) rows.push(`<div class="venue">📍 ${esc(venue)}</div>`);
  (details.goals||[]).forEach(g => {
    const mn = g.clock ? ` ${esc(g.clock)}` : "";
    const a = g.assist ? ` <span class="assist">(assist: ${esc(g.assist)})</span>` : "";
    rows.push(`<div class="ev">⚽${mn} ${flag(g.abbr)} ${esc(g.scorer)}${a}</div>`);
  });
  (details.cards||[]).forEach(c => {
    const mn = c.clock ? ` ${esc(c.clock)}` : "";
    rows.push(`<div class="ev">${c.color}${mn} ${flag(c.abbr)} ${esc(c.player)}</div>`);
  });
  const detailsHtml = rows.length ? `<div class="details">${rows.join("")}</div>` : "";

  return `<div class="match${state==="in"?" live":""}">
    <div class="team home"><span class="tname${home.winner?" winner":""}">${esc(home.name)}</span><span class="flag">${flag(home.abbr)}</span></div>
    <div class="center">${center}${badge}</div>
    <div class="team away"><span class="flag">${flag(away.abbr)}</span><span class="tname${away.winner?" winner":""}">${esc(away.name)}</span></div>
    ${detailsHtml}
  </div>`;
}

function postHeight(){
  const h = document.documentElement.scrollHeight;
  try { parent.postMessage({ type: "wc-widget-height", height: h }, "*"); } catch(e){}
}

async function load(){
  $("day").textContent = "Yesterday & today";
  try {
    // Rolling 24h: yesterday + today, so finished matches (and their details) linger a full day.
    const now = new Date();
    const yest = new Date(now); yest.setDate(now.getDate() - 1);
    const days = await Promise.all([compactOf(yest), compactOf(now)].map(d =>
      fetch(SCOREBOARD + d, { cache: "no-store" })
        .then(r => r.ok ? r.json() : { events: [] })
        .catch(() => ({ events: [] }))
    ));
    const seen = new Set();
    const events = [];
    days.forEach(d => (d.events || []).forEach(ev => {
      const id = String(ev.id || "");
      if (id && !seen.has(id)) { seen.add(id); events.push(ev); }
    }));
    events.sort((a, b) => (a.date || "").localeCompare(b.date || ""));

    if (!events.length) { $("list").innerHTML = `<div class="note">No matches.</div>`; postHeight(); return; }

    // Goals/assists/cards live in the per-match summary; fetch only for live/finished matches.
    const enriched = await Promise.all(events.map(async ev => {
      const comp = (ev.competitions||[])[0] || {};
      const type = (comp.status||ev.status||{}).type || {};
      const state = type.state || "pre";
      let details = { goals: [], cards: [] };
      if (state === "post" || type.completed) {
        details = finalDetails[ev.id] || (finalDetails[ev.id] = await fetchDetails(ev.id));
      } else if (state === "in") {
        details = await fetchDetails(ev.id);
      }
      return { ev, details };
    }));

    let html = "", lastLabel = "";
    enriched.forEach(x => {
      const lbl = dayLabel(x.ev.date);
      if (lbl !== lastLabel) { html += `<div class="daygroup">${esc(lbl)}</div>`; lastLabel = lbl; }
      html += renderMatch(x.ev, x.details);
    });
    $("list").innerHTML = html;
    $("foot").innerHTML = `Updated ${new Date().toLocaleTimeString()} · <a href="scoreboard.html" target="_blank" rel="noopener">full scoreboard ↗</a>`;
  } catch(e) {
    $("list").innerHTML = `<div class="note">Couldn't load scores. Retrying…</div>`;
  }
  postHeight();
}

window.addEventListener("load", postHeight);
window.addEventListener("resize", postHeight);
document.addEventListener("visibilitychange", () => { if(!document.hidden) load(); });
load();
setInterval(load, REFRESH_MS);
</script>
</body>
</html>
