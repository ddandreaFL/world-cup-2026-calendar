name: Update World Cup calendar

# GitHub's scheduled-cron floor is every 5 min, so to update faster we run a
# single job that loops internally ~every 150s for ~55 min. The schedule is
# just a heartbeat that keeps a fresh run queued to take over when one ends;
# the concurrency group guarantees only one loop runs at a time.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-calendar
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 58
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate and push on a ~2.5-minute loop
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stop ~55 min in so the job finishes before the 58-min timeout and
          # hands off to the next scheduled run.
          deadline=$(( $(date +%s) + 55*60 ))

          while [ "$(date +%s)" -lt "$deadline" ]; do
            iter_start=$(date +%s)

            python generate.py || echo "generate.py failed this iteration; will retry."

            git add docs/world_cup_2026.ics cache/assists.json cache/scoreboard_days.json 2>/dev/null || true
            if git diff --cached --quiet; then
              echo "No changes."
            else
              git commit -m "Update World Cup scores"
              for attempt in 1 2 3; do
                if git push; then
                  break
                fi
                echo "push failed (attempt $attempt), rebasing on remote..."
                git pull --rebase --autostash || true
                sleep 2
              done
            fi

            # Pace each cycle to ~150s (balance freshness vs. commit/API volume).
            elapsed=$(( $(date +%s) - iter_start ))
            remaining=$(( 150 - elapsed ))
            if [ "$remaining" -gt 0 ]; then
              sleep "$remaining"
            fi
          done
