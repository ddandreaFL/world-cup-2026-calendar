name: Update World Cup calendar

# Each run is independent: generate once, commit if changed, exit. If a run is
# delayed, skipped, or fails, the next scheduled run simply recovers. No long
# loops, no fragile hand-off. */5 is GitHub's minimum cron interval and is far
# fresher than any calendar app refreshes anyway.
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-calendar
  cancel-in-progress: true   # never let a stuck run block the next one

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate and commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          python generate.py

          git add docs/world_cup_2026.ics cache/assists.json cache/scoreboard_days.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes this run."
          else
            git commit -m "Update World Cup scores"
            for attempt in 1 2 3; do
              git push && break
              echo "push failed (attempt $attempt), rebasing on remote..."
              git pull --rebase --autostash || true
              sleep 2
            done
          fi
